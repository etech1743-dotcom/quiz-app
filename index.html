<style>
body{

#startScreen{

justify-content:center;
margin-top:100px;
}

.start-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
text-align:center;
}

.wrapper{
display:flex;
gap:30px;
display:none;
}

.container{
background:white;
width:700px;
padding:30px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.score-panel{
width:220px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
display:none;
}

.score-box{
margin:10px 0;
padding:8px;
background:#f1f1f1;
border-radius:5px;
}

h1{text-align:center;color:#4a90e2;}
.question{font-size:20px;margin:20px 0;}

.options{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.option{
padding:12px;
background:#f1f1f1;
border-radius:6px;
cursor:pointer;
border:2px solid transparent;
}

.option.selected{
border:2px solid #4a90e2;
background:#ebf5fb;
}

.option.correct{
border:2px solid #27ae60;
background:#eafaf1;
}

.option.wrong{
border:2px solid #c0392b;
background:#fdecea;
}

.controls{
margin-top:20px;
display:flex;
justify-content:space-between;
}

button{
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
color:white;
}

.prev{background:#7f8c8d;}
.next{background:#4a90e2;}
.submit{background:#27ae60;}

.nav-grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:10px;
margin-top:30px;
}

.nav-box{
padding:10px;
text-align:center;
border:1px solid #ccc;
cursor:pointer;
background:white;
}
</style>

<div class="wrapper">

<div class="container">
<h1>Math Quiz</h1>
<div id="question"></div>
<div class="options" id="options"></div>

<div class="controls">
<button class="prev" id="prevBtn" onclick="prevQuestion()">Previous</button>
<button class="next" id="nextBtn" onclick="nextQuestion()">Next</button>
<button class="submit" id="submitBtn" onclick="submitQuiz()">Submit</button>
</div>

<div class="nav-grid" id="navGrid"></div>
</div>

<div class="score-panel" id="scorePanel">
<h3>Score Panel</h3>
<div class="score-box">Total: <span id="totalQ"></span></div>
<div class="score-box">Attempted: <span id="attemptedQ"></span></div>
<div class="score-box">Correct: <span id="correctQ"></span></div>
<div class="score-box">Wrong: <span id="wrongQ"></span></div>
<div class="score-box">Score %: <span id="percent"></span></div>
</div>

</div>

function startQuiz(){
let email=document.getElementById("userEmail").value;
if(email===""){ alert("Enter email"); return; }

userEmail=email;
document.getElementById("startScreen").style.display="none";
document.querySelector(".wrapper").style.display="flex";

init();
}

let answers=new Array(questions.length).fill(null);
let submitted=false;

const qText=document.getElementById("question");
const optionsDiv=document.getElementById("options");
const navGrid=document.getElementById("navGrid");

function init(){
document.getElementById("totalQ").innerText=questions.length;
createNav();
loadQuestion();
}

function createNav(){
questions.forEach((q,i)=>{
const box=document.createElement("div");
box.className="nav-box";
box.innerText=i+1;
box.id="nav"+i;
box.onclick=()=>jump(i);
navGrid.appendChild(box);
});
}

function loadQuestion(){
const q=questions[current];
qText.innerText=(current+1)+". "+q.q;
optionsDiv.innerHTML="";

q.options.forEach((opt,i)=>{
const btn=document.createElement("div");
btn.className="option";
let text=opt;

if(submitted){
if(opt===q.ans){
btn.classList.add("correct");
text+=" ✔";
}
if(answers[current]===i && opt!==q.ans){
btn.classList.add("wrong");
text+=" ✖";
}
}else{
if(answers[current]===i){
btn.classList.add("selected");
}
btn.onclick=()=>select(i);
}

btn.innerText=text;
optionsDiv.appendChild(btn);
});

updateButtons();
updateNav();
}

function select(i){
answers[current]=i;
loadQuestion();
}

function updateButtons(){
prevBtn.disabled=(current===0);
if(current===questions.length-1){
nextBtn.style.display="none";
submitBtn.style.display="inline-block";
}else{
nextBtn.style.display="inline-block";
submitBtn.style.display="none";
}
}

function updateNav(){
questions.forEach((q,i)=>{
const box=document.getElementById("nav"+i);

if(i===current){
box.style.border="2px solid #4a90e2";
}else{
box.style.border="1px solid #ccc";
}

if(!submitted){
if(answers[i]!==null){
box.style.background="black";
box.style.color="white";
}else{
box.style.background="white";
box.style.color="black";
}
}else{
if(answers[i]===null){
box.style.background="#bdc3c7";
}
else if(questions[i].options[answers[i]]===q.ans){
box.style.background="#27ae60";
}
else{
box.style.background="#c0392b";
}
box.style.color="white";
}

box.onclick=()=>jump(i);
});
}

function nextQuestion(){ current++; loadQuestion(); }
function prevQuestion(){ current--; loadQuestion(); }
function jump(i){ current=i; loadQuestion(); }

function submitQuiz(){

submitted=true;
document.getElementById("scorePanel").style.display="block";

let attempted=0,correct=0,wrong=0;

answers.forEach((a,i)=>{
if(a!==null){
attempted++;
if(questions[i].options[a]===questions[i].ans){correct++;}
else{wrong++;}
}
});

let percent=Math.round((correct/questions.length)*100);

attemptedQ.innerText=attempted;
correctQ.innerText=correct;
wrongQ.innerText=wrong;
percent.innerText=percent+"%";

loadQuestion();
updateNav();

/* EMAIL */
emailjs.send("service_ux4v0sa","template_z4lof68",{
to_email:userEmail,
score:correct,
total:questions.length,
percentage:percent+"%"
});

}

</script>
